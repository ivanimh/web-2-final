<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProductCRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
<div class="w-full max-w-sm">

    <!-- Header App -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Product<span class="text-blue-600">CRUD</span></h1>
        <p class="text-gray-500 text-sm mt-2">Silakan masuk ke akun Anda</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-8">

        <!-- Alerts -->
        <div th:if="${param.error}" class="mb-5 p-3 bg-red-50 text-red-600 text-sm rounded-md border border-red-100">
            Username atau password salah. Coba lagi.
        </div>
        <div th:if="${param.logout}" class="mb-5 p-3 bg-blue-50 text-blue-600 text-sm rounded-md border border-blue-100">
            Berhasil logout. Sampai jumpa.
        </div>
        <div th:if="${success}" class="mb-5 p-3 bg-green-50 text-green-600 text-sm rounded-md border border-green-100" th:text="${success}"></div>

        <!-- Form -->
        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md text-sm transition-colors mt-2">
                Masuk
            </button>
        </form>

        <p class="text-center mt-6 text-gray-500 text-sm">
            Belum punya akun?
            <a th:href="@{/register}" class="text-blue-600 hover:underline font-medium">Daftar sekarang</a>
        </p>
    </div>

</div>
</body>
</html>
