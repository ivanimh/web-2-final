<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-gray-100">
<div class="container mx-auto px-4">
    <div class="flex justify-center mt-20">
        <div class="w-full md:w-5/12">
            <div class="bg-white rounded-lg shadow-md border border-gray-200">
                <div class="p-8">
                    <h3 class="text-2xl font-medium text-center mb-6">Login</h3>

                    <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                        Username atau password salah!
                    </div>

                    <div th:if="${param.logout}" class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded mb-4">
                        Berhasil logout.
                    </div>

                    <div th:if="${success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label for="username" class="block text-gray-700 mb-2">Username</label>
                            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow" id="username" name="username"
                                   placeholder="Masukkan username" required autofocus>
                        </div>
                        <div class="mb-6">
                            <label for="password" class="block text-gray-700 mb-2">Password</label>
                            <input type="password" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow" id="password" name="password"
                                   placeholder="Masukkan password" required>
                        </div>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 w-full rounded transition-colors">Login</button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-gray-600">Belum punya akun? </span>
                        <a th:href="@{/register}" class="text-blue-600 hover:underline">Daftar di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
