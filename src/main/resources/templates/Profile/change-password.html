<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Ganti Password</title></head>
<body>
<main th:fragment="main">
    <div class="max-w-md mx-auto">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Ganti Password</h1>
            <p class="text-sm text-gray-500 mt-1">Gunakan password yang kuat untuk keamanan akun Anda.</p>
        </div>

        <div th:if="${successMessage}" class="mb-5 p-3 bg-green-50 text-green-600 text-sm rounded-md border border-green-100" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-5 p-3 bg-red-50 text-red-600 text-sm rounded-md border border-red-100" th:text="${errorMessage}"></div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6 sm:p-8">
            <form th:action="@{/profile/change-password}" th:object="${changePasswordRequest}" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password Lama <span class="text-red-500">*</span></label>
                    <input type="password" th:field="*{oldPassword}" required
                           class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                </div>

                <div class="border-t border-gray-100 pt-5 space-y-4 mt-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password Baru <span class="text-red-500">*</span></label>
                        <input type="password" th:field="*{newPassword}" required
                               class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Konfirmasi Password Baru <span class="text-red-500">*</span></label>
                        <input type="password" th:field="*{confirmNewPassword}" required
                               class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium transition-colors">
                        Simpan Password
                    </button>
                    <a href="/profile" class="border border-gray-300 text-gray-700 hover:bg-gray-50 px-5 py-2 rounded-md text-sm font-medium transition-colors">
                        Batal
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
