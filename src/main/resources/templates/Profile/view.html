<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Profil Saya</title>
</head>
<body>
<main th:fragment="main">
    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-gray-900">Profil Saya</h1>
            <div class="flex gap-2">
                <a href="/profile/edit" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-md text-sm font-medium transition-colors">
                    Edit Profil
                </a>
                <a href="/profile/change-password" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-md text-sm font-medium transition-colors">
                    Ganti Password
                </a>
            </div>
        </div>

        <div th:if="${successMessage}" class="mb-5 p-3 bg-green-50 text-green-600 text-sm rounded-md border border-green-100" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-5 p-3 bg-red-50 text-red-600 text-sm rounded-md border border-red-100" th:text="${errorMessage}"></div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
            <!-- Header Profil -->
            <div class="px-6 py-8 sm:px-8 border-b border-gray-200">
                <div class="flex items-center gap-5">
                    <div th:if="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}">
                        <img th:src="${user.profileImageUrl}" alt="Foto Profil" class="w-20 h-20 rounded-full object-cover border border-gray-200"/>
                    </div>
                    <div th:unless="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}"
                         class="w-20 h-20 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-2xl font-bold border border-blue-200">
                        <span th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">U</span>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-900" th:text="${user.fullName != null ? user.fullName : user.username}">Nama Lengkap</h2>
                        <p class="text-gray-500 text-sm" th:text="'@' + ${user.username}">@username</p>
                    </div>
                </div>
            </div>

            <!-- Detail Data -->
            <dl class="divide-y divide-gray-100">
                <div class="px-6 py-4 sm:px-8 grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <dt class="text-sm font-medium text-gray-500">Email</dt>
                    <dd class="text-sm text-gray-900 sm:col-span-2" th:text="${user.email != null ? user.email : '-'}">-</dd>
                </div>
                <div class="px-6 py-4 sm:px-8 grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <dt class="text-sm font-medium text-gray-500">No. Telepon</dt>
                    <dd class="text-sm text-gray-900 sm:col-span-2" th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}">-</dd>
                </div>
                <div class="px-6 py-4 sm:px-8 grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <dt class="text-sm font-medium text-gray-500">Alamat</dt>
                    <dd class="text-sm text-gray-900 sm:col-span-2" th:text="${user.address != null ? user.address : '-'}">-</dd>
                </div>
                <div class="px-6 py-4 sm:px-8 grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <dt class="text-sm font-medium text-gray-500">Bio</dt>
                    <dd class="text-sm text-gray-900 sm:col-span-2 whitespace-pre-wrap" th:text="${user.bio != null ? user.bio : '-'}">-</dd>
                </div>
            </dl>
        </div>
    </div>
</main>
</body>
</html>
