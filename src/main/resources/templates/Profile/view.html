<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Profil Saya</title>
</head>
<body>
<main>
    <div class="container mx-auto px-4 mt-8" style="max-width: 700px;">

        <!-- Flash messages -->
        <div th:if="${successMessage}"
             class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4"
             th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"
             class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"
             th:text="${errorMessage}"></div>

        <div class="bg-white rounded-lg shadow p-6">

            <!-- Avatar + nama -->
            <div class="flex items-center gap-6 mb-6">
                <!-- Foto profil: tampilkan URL jika ada, fallback ke placeholder inisial -->
                <div th:if="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}">
                    <img th:src="${user.profileImageUrl}"
                         alt="Foto Profil"
                         class="w-24 h-24 rounded-full object-cover border-2 border-blue-400"/>
                </div>
                <!-- Placeholder inisial jika tidak ada foto -->
                <div th:unless="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}"
                     class="w-24 h-24 rounded-full bg-blue-600 flex items-center justify-center text-white text-3xl font-bold">
                    <span th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}"></span>
                </div>

                <div>
                    <h2 class="text-2xl font-bold text-gray-800"
                        th:text="${user.fullName != null ? user.fullName : user.username}"></h2>
                    <p class="text-gray-500 text-sm" th:text="'@' + ${user.username}"></p>
                </div>
            </div>

            <hr class="mb-6"/>

            <!-- Detail info -->
            <div class="grid grid-cols-1 gap-4 text-sm">

                <div class="flex gap-2">
                    <span class="w-36 text-gray-500 font-medium">Username</span>
                    <span class="text-gray-800" th:text="${user.username}"></span>
                </div>

                <div class="flex gap-2">
                    <span class="w-36 text-gray-500 font-medium">Nama Lengkap</span>
                    <span class="text-gray-800"
                          th:text="${user.fullName != null ? user.fullName : '-'}"></span>
                </div>

                <div class="flex gap-2">
                    <span class="w-36 text-gray-500 font-medium">Email</span>
                    <span class="text-gray-800"
                          th:text="${user.email != null ? user.email : '-'}"></span>
                </div>

                <div class="flex gap-2">
                    <span class="w-36 text-gray-500 font-medium">No. Telepon</span>
                    <span class="text-gray-800"
                          th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}"></span>
                </div>

                <div class="flex gap-2">
                    <span class="w-36 text-gray-500 font-medium">Alamat</span>
                    <span class="text-gray-800"
                          th:text="${user.address != null ? user.address : '-'}"></span>
                </div>

                <div class="flex gap-2">
                    <span class="w-36 text-gray-500 font-medium">Bio</span>
                    <span class="text-gray-800"
                          th:text="${user.bio != null ? user.bio : '-'}"></span>
                </div>

            </div>

            <hr class="my-6"/>

            <!-- Tombol aksi -->
            <div class="flex gap-3">
                <a href="/profile/edit"
                   class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors text-sm">
                    ✏ Edit Profil
                </a>
                <a href="/profile/change-password"
                   class="border border-yellow-500 text-yellow-600 hover:bg-yellow-500 hover:text-white px-4 py-2 rounded transition-colors text-sm">
                    🔒 Ganti Password
                </a>
            </div>

        </div>
    </div>
</main>
</body>
</html>
