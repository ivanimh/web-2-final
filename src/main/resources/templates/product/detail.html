<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mx-auto px-4 mt-8">
    <div class="flex justify-center">
        <div class="w-full md:w-2/3">
            <h2 th:text="${product.name}" class="text-3xl font-medium mb-6">Nama Produk</h2>

            <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                <div class="p-6">
                    <table class="w-full text-left mb-0">
                        <tr>
                            <th class="text-gray-500 font-normal pb-2" style="width: 200px;">Nama</th>
                            <td th:text="${product.name}" class="pb-2">-</td>
                        </tr>
                        <tr>
                            <th class="text-gray-500 font-normal pb-2">Kategori</th>
                            <td th:text="${product.category?.displayName}" class="pb-2">-</td>
                        </tr>
                        <tr>
                            <th class="text-gray-500 font-normal pb-2">Harga</th>
                            <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}" class="pb-2">Rp 0</td>
                        </tr>
                        <tr>
                            <th class="text-gray-500 font-normal pb-2">Stok</th>
                            <td th:text="${product.stock}" class="pb-2">0</td>
                        </tr>
                        <tr>
                            <th class="text-gray-500 font-normal pb-2">Deskripsi</th>
                            <td th:text="${product.description}" class="pb-2">-</td>
                        </tr>
                        <tr>
                            <th class="text-gray-500 font-normal pb-2">Status</th>
                            <td class="pb-2">
                                <span th:if="${product.active}" class="bg-green-500 text-white px-2 py-1 rounded text-sm font-medium">Aktif</span>
                                <span th:unless="${product.active}" class="bg-red-500 text-white px-2 py-1 rounded text-sm font-medium">Tidak Aktif</span>
                            </td>
                        </tr>
                        <tr>
                            <th class="text-gray-500 font-normal">Tanggal Dibuat</th>
                            <td th:text="${product.createdAt}">-</td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="flex gap-2 mt-6">
                <a th:href="@{/products/{id}/edit(id=${product.id})}" class="bg-yellow-500 hover:bg-yellow-600 text-black px-4 py-2 rounded transition-colors">Edit</a>
                <a th:href="@{/products}" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition-colors">Kembali ke Daftar</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
