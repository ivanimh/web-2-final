<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${product.name}">Detail Produk</title>
</head>
<body>
<main th:fragment="main">
    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex items-center justify-between">
            <div>
                <a href="/products" class="text-sm text-blue-600 hover:underline mb-2 inline-block">&larr; Kembali ke Daftar Produk</a>
                <h1 class="text-2xl font-bold text-gray-900" th:text="${product.name}">Nama Produk</h1>
            </div>
        </div>

        <div th:if="${successMessage}" class="mb-5 p-3 bg-green-50 text-green-600 text-sm rounded-md border border-green-100" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-5 p-3 bg-red-50 text-red-600 text-sm rounded-md border border-red-100" th:text="${errorMessage}"></div>

        <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden mb-6">
            <div class="px-6 py-5 border-b border-gray-200 bg-gray-50">
                <h3 class="text-base font-semibold text-gray-900">Informasi Detail Produk</h3>
            </div>
            <div class="border-t border-gray-200">
                <dl class="divide-y divide-gray-200">
                    <div class="px-6 py-4 grid grid-cols-3 gap-4">
                        <dt class="text-sm font-medium text-gray-500">Kategori</dt>
                        <dd class="text-sm text-gray-900 col-span-2" th:text="${product.category != null ? product.category.name : '-'}">-</dd>
                    </div>
                    <div class="px-6 py-4 grid grid-cols-3 gap-4">
                        <dt class="text-sm font-medium text-gray-500">Harga</dt>
                        <dd class="text-sm text-gray-900 col-span-2 font-semibold" th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">-</dd>
                    </div>
                    <div class="px-6 py-4 grid grid-cols-3 gap-4">
                        <dt class="text-sm font-medium text-gray-500">Stok</dt>
                        <dd class="text-sm col-span-2 flex items-center gap-2">
                            <span th:text="${product.stock}" th:class="${product.stock < 5} ? 'font-bold text-red-600' : 'text-gray-900'"></span>
                            <span th:if="${product.stock < 5}" class="text-xs bg-red-50 text-red-600 px-2 py-0.5 rounded-full border border-red-100 font-medium">Menipis</span>
                        </dd>
                    </div>
                    <div class="px-6 py-4 grid grid-cols-3 gap-4">
                        <dt class="text-sm font-medium text-gray-500">Status</dt>
                        <dd class="text-sm col-span-2">
                            <span th:if="${product.active}" class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Aktif</span>
                            <span th:unless="${product.active}" class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">Nonaktif</span>
                        </dd>
                    </div>
                    <div class="px-6 py-4 grid grid-cols-3 gap-4">
                        <dt class="text-sm font-medium text-gray-500">Deskripsi</dt>
                        <dd class="text-sm text-gray-900 col-span-2" th:text="${product.description != null ? product.description : '-'}">-</dd>
                    </div>
                    <div class="px-6 py-4 grid grid-cols-3 gap-4">
                        <dt class="text-sm font-medium text-gray-500">Dibuat Pada</dt>
                        <dd class="text-sm text-gray-900 col-span-2" th:text="${product.createdAt}">-</dd>
                    </div>
                </dl>
            </div>
        </div>

        <div class="flex gap-3">
            <a th:href="@{/products/{id}/edit(id=${product.id})}" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium transition-colors">
                Edit Produk
            </a>
            <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?')">
                <button type="submit" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 px-5 py-2 rounded-md text-sm font-medium transition-colors">
                    Hapus Produk
                </button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
