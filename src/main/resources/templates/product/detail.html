<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${product.name}">Detail Produk</title>
</head>
<body>
<main>
    <div class="container mx-auto px-4 max-w-3xl">

        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-semibold" th:text="${product.name}">Nama Produk</h2>
            <a href="/products" class="text-sm text-gray-500 hover:text-gray-800 transition-colors">
                &larr; Kembali ke Daftar
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMessage}"
             class="mb-4 px-4 py-3 rounded bg-green-100 text-green-800 border border-green-300"
             th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"
             class="mb-4 px-4 py-3 rounded bg-red-100 text-red-800 border border-red-300"
             th:text="${errorMessage}"></div>

        <!-- Card detail -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-sm">
                <tbody>
                <tr class="border-b border-gray-100">
                    <th class="text-left text-gray-500 font-medium px-6 py-4 w-40">Nama</th>
                    <td class="px-6 py-4 text-gray-900" th:text="${product.name}">-</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="text-left text-gray-500 font-medium px-6 py-4">Kategori</th>
                    <td class="px-6 py-4 text-gray-900"
                        th:text="${product.category != null ? product.category.name : '-'}">-</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="text-left text-gray-500 font-medium px-6 py-4">Harga</th>
                    <td class="px-6 py-4 text-gray-900"
                        th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">-</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="text-left text-gray-500 font-medium px-6 py-4">Stok</th>
                    <td class="px-6 py-4">
                            <span th:text="${product.stock}"
                                  th:class="${product.stock < 5} ? 'text-red-600 font-bold' : 'text-gray-900'"></span>
                        <span th:if="${product.stock < 5}"
                              class="ml-2 text-xs text-red-500">(Stok menipis!)</span>
                    </td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="text-left text-gray-500 font-medium px-6 py-4">Status</th>
                    <td class="px-6 py-4">
                            <span th:if="${product.active}"
                                  class="inline-block px-2 py-1 text-xs rounded-full bg-green-100 text-green-700 font-medium">
                                Aktif
                            </span>
                        <span th:unless="${product.active}"
                              class="inline-block px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-600 font-medium">
                                Nonaktif
                            </span>
                    </td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="text-left text-gray-500 font-medium px-6 py-4">Deskripsi</th>
                    <td class="px-6 py-4 text-gray-900"
                        th:text="${product.description != null ? product.description : '-'}">-</td>
                </tr>
                <tr>
                    <th class="text-left text-gray-500 font-medium px-6 py-4">Tanggal Dibuat</th>
                    <td class="px-6 py-4 text-gray-900" th:text="${product.createdAt}">-</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Aksi -->
        <div class="flex gap-3 mt-6">
            <a th:href="@{/products/{id}/edit(id=${product.id})}"
               class="px-4 py-2 bg-yellow-400 hover:bg-yellow-500 text-white text-sm font-medium rounded-lg transition-colors">
                Edit Produk
            </a>
            <form th:action="@{/products/{id}/delete(id=${product.id})}"
                  method="post"
                  onsubmit="return confirm('Hapus produk ini?')">
                <button type="submit"
                        class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-lg transition-colors">
                    Hapus Produk
                </button>
            </form>
        </div>

    </div>
</main>
</body>
</html>
