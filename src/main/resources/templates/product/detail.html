<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${product.name}">Detail Produk</title>
</head>
<body>
<main>
    <div class="container mt-4" style="max-width: 700px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Detail Produk</h2>
            <a href="/products" class="btn btn-outline-secondary">Kembali</a>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-borderless mb-0">
                    <tbody>
                    <tr>
                        <th width="150">Nama</th>
                        <td th:text="${product.name}"></td>
                    </tr>
                    <tr>
                        <th>Kategori</th>
                        <td th:text="${product.category != null ? product.category.name : '-'}"></td>
                    </tr>
                    <tr>
                        <th>Harga</th>
                        <td th:text="'Rp ' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}"></td>
                    </tr>
                    <tr>
                        <th>Stok</th>
                        <td>
                                <span th:text="${product.stock}"
                                      th:class="${product.stock < 5} ? 'text-danger fw-bold' : ''"></span>
                            <small th:if="${product.stock < 5}" class="text-danger"> (Stok menipis!)</small>
                        </td>
                    </tr>
                    <tr>
                        <th>Status</th>
                        <td>
                            <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                            <span th:unless="${product.active}" class="badge bg-secondary">Nonaktif</span>
                        </td>
                    </tr>
                    <tr>
                        <th>Deskripsi</th>
                        <td th:text="${product.description != null ? product.description : '-'}"></td>
                    </tr>
                    <tr>
                        <th>Dibuat</th>
                        <td th:text="${product.createdAt}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex gap-2 mt-3">
            <a th:href="@{/products/{id}/edit(id=${product.id})}"
               class="btn btn-primary">Edit Produk</a>
            <form th:action="@{/products/{id}/delete(id=${product.id})}"
                  method="post"
                  onsubmit="return confirm('Hapus produk ini?')">
                <button type="submit" class="btn btn-danger">Hapus Produk</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
