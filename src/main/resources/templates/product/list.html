<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Daftar Produk</title>
</head>
<body>
<main>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Daftar Produk</h2>
            <a href="/products/new" class="btn btn-primary">+ Tambah Produk</a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <!-- Info total -->
        <p class="text-muted small" th:if="${totalItems > 0}">
            Menampilkan <span th:text="${products.size()}"></span> dari
            <span th:text="${totalItems}"></span> produk
            (halaman <span th:text="${currentPage + 1}"></span> dari
            <span th:text="${totalPages}"></span>)
        </p>

        <!-- Kosong -->
        <div th:if="${products.empty}" class="text-center text-muted py-5">
            <p>Belum ada produk.</p>
            <a href="/products/new" class="btn btn-primary">Tambah Produk Pertama</a>
        </div>

        <!-- Tabel produk -->
        <table th:unless="${products.empty}" class="table table-bordered table-hover">
            <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product, stat : ${products}">
                <td th:text="${currentPage * 10 + stat.index + 1}"></td>
                <td>
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       th:text="${product.name}"></a>
                </td>
                <td th:text="${product.category != null ? product.category.name : '-'}"></td>
                <td th:text="'Rp ' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}"></td>
                <td>
                        <span th:text="${product.stock}"
                              th:class="${product.stock < 5} ? 'text-danger fw-bold' : ''"></span>
                </td>
                <td>
                    <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${product.active}" class="badge bg-secondary">Nonaktif</span>
                </td>
                <td>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}"
                       class="btn btn-sm btn-outline-primary me-1">Edit</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}"
                          method="post" style="display:inline"
                          onsubmit="return confirm('Hapus produk ini?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" aria-label="Navigasi halaman">
            <ul class="pagination justify-content-center">

                <!-- Tombol Previous -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage - 1})}">
                        &laquo; Sebelumnya
                    </a>
                </li>

                <!-- Nomor halaman -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/products(page=${i})}"
                       th:text="${i + 1}">
                    </a>
                </li>

                <!-- Tombol Next -->
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage + 1})}">
                        Berikutnya &raquo;
                    </a>
                </li>

            </ul>
        </nav>

    </div>
</main>
</body>
</html>
