<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Daftar Produk</title></head>
<body>
<main th:fragment="main">
    <div>
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Daftar Produk</h1>
            <a href="/products/new" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
                + Tambah Produk
            </a>
        </div>

        <div th:if="${successMessage}" class="mb-5 p-3 bg-green-50 text-green-600 text-sm rounded-md border border-green-100" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-5 p-3 bg-red-50 text-red-600 text-sm rounded-md border border-red-100" th:text="${errorMessage}"></div>

        <!-- Search & Filter -->
        <form th:action="@{/products}" method="get" class="mb-6 bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col sm:flex-row gap-4 sm:items-end">
            <div class="flex-1 w-full">
                <label for="keyword" class="block text-sm font-medium text-gray-700 mb-1.5">Cari Berdasarkan Nama</label>
                <input type="text" id="keyword" name="keyword" th:value="${keyword}"
                       class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                       placeholder="Ketik nama produk...">
            </div>

            <div class="w-full sm:w-64">
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1.5">Kategori</label>
                <select id="category" name="category"
                        class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    <option value="">Semua Kategori</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == selectedCategory}"></option>
                </select>
            </div>

            <div class="w-full sm:w-auto flex gap-2">
                <button type="submit" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium transition-colors">
                    Terapkan
                </button>
                <a th:href="@{/products}" class="w-full sm:w-auto text-center bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-md text-sm font-medium transition-colors">
                    Reset
                </a>
            </div>
        </form>

        <!-- Empty State -->
        <div th:if="${products.empty}" class="bg-white border border-gray-200 rounded-lg p-12 text-center shadow-sm">
            <p class="text-gray-600 text-base font-medium">Tidak ada produk.</p>
            <p class="text-gray-400 text-sm mt-1">Coba sesuaikan kata kunci pencarian atau filter kategori Anda.</p>
        </div>

        <!-- Tabel -->
        <div th:unless="${products.empty}" class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-12">#</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hidden sm:table-cell">Kategori</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Harga</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stok</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                    </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="p, stat : ${products}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"
                            th:text="${(currentPage * 10) + stat.index + 1}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900"
                            th:text="${p.name}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 hidden sm:table-cell"
                            th:text="${p.category != null ? p.category.name : '-'}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900"
                            th:text="'Rp ' + ${#numbers.formatDecimal(p.price, 0, 'POINT', 0, 'COMMA')}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <span th:text="${p.stock}"
                                      th:class="${p.stock < 5} ? 'font-bold text-red-600' : 'text-gray-900'"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <div class="flex items-center gap-3">
                                <a th:href="@{/products/{id}(id=${p.id})}"
                                   class="text-gray-600 hover:text-gray-900">Detail</a>
                                <a th:href="@{/products/{id}/edit(id=${p.id})}"
                                   class="text-blue-600 hover:text-blue-900">Edit</a>
                                <form th:action="@{/products/{id}/delete(id=${p.id})}"
                                      method="post" style="display:inline"
                                      onsubmit="return confirm('Hapus produk ini?')">
                                    <button type="submit"
                                            class="text-red-600 hover:text-red-900">Hapus</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div th:if="${totalPages > 1}" class="bg-gray-50 px-6 py-3 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-3">
                <span class="text-sm text-gray-700"
                      th:text="'Menampilkan halaman ' + (${currentPage + 1}) + ' dari ' + ${totalPages}"></span>

                <div class="flex gap-1">
                    <!-- Sebelumnya -->
                    <a th:if="${currentPage > 0}"
                       th:href="@{/products(keyword=${keyword}, category=${selectedCategory}, page=${currentPage - 1})}"
                       class="px-3 py-1 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                        &laquo; Sebelumnya
                    </a>

                    <!-- Nomor halaman -->
                    <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                       th:href="@{/products(keyword=${keyword}, category=${selectedCategory}, page=${i})}"
                       th:text="${i + 1}"
                       th:class="${i == currentPage} ?
                           'px-3 py-1 border rounded-md text-sm font-medium bg-blue-600 text-white border-blue-600' :
                           'px-3 py-1 border rounded-md text-sm font-medium bg-white text-gray-700 border-gray-300 hover:bg-gray-50'">
                    </a>

                    <a th:if="${currentPage < totalPages - 1}"
                       th:href="@{/products(keyword=${keyword}, category=${selectedCategory}, page=${currentPage + 1})}"
                       class="px-3 py-1 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                        Selanjutnya &raquo;
                    </a>
                </div>
            </div>

        </div>
    </div>
</main>
</body>
</html>
