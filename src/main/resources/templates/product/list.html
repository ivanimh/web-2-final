<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Daftar Produk</title>
</head>
<body>
<main>
    <div class="container mx-auto px-4 mt-8">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-3xl font-medium">Daftar Produk</h2>
            <a href="/products/new" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">+ Tambah Produk</a>
        </div>

        <div th:if="${successMessage}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" th:text="${errorMessage}"></div>

        <p class="text-gray-500 text-sm mb-4" th:if="${totalItems > 0}">
            Menampilkan <span th:text="${products.size()}"></span> dari
            <span th:text="${totalItems}"></span> produk
            (halaman <span th:text="${currentPage + 1}"></span> dari
            <span th:text="${totalPages}"></span>)
        </p>

        <div th:if="${products.empty}" class="text-center text-gray-500 py-12">
            <p class="mb-4">Belum ada produk.</p>
            <a href="/products/new" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">Tambah Produk Pertama</a>
        </div>

        <div class="overflow-x-auto">
            <table th:unless="${products.empty}" class="w-full border border-gray-200 bg-white shadow-sm rounded-lg overflow-hidden">
                <thead class="bg-gray-100 border-b border-gray-200">
                <tr>
                    <th class="border-r border-gray-200 px-4 py-3 text-left font-medium text-gray-700 whitespace-nowrap">#</th>
                    <th class="border-r border-gray-200 px-4 py-3 text-left font-medium text-gray-700 whitespace-nowrap">Nama</th>
                    <th class="border-r border-gray-200 px-4 py-3 text-left font-medium text-gray-700 whitespace-nowrap">Kategori</th>
                    <th class="border-r border-gray-200 px-4 py-3 text-left font-medium text-gray-700 whitespace-nowrap">Harga</th>
                    <th class="border-r border-gray-200 px-4 py-3 text-left font-medium text-gray-700 whitespace-nowrap">Stok</th>
                    <th class="border-r border-gray-200 px-4 py-3 text-left font-medium text-gray-700 whitespace-nowrap">Status</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-700 whitespace-nowrap">Aksi</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                <tr th:each="product, stat : ${products}" class="hover:bg-gray-50 transition-colors">
                    <td class="border-r border-gray-200 px-4 py-2" th:text="${currentPage * 10 + stat.index + 1}"></td>
                    <td class="border-r border-gray-200 px-4 py-2">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           th:text="${product.name}" class="text-blue-600 hover:underline"></a>
                    </td>
                    <td class="border-r border-gray-200 px-4 py-2" th:text="${product.category != null ? product.category.name : '-'}"></td>
                    <td class="border-r border-gray-200 px-4 py-2 whitespace-nowrap" th:text="'Rp ' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}"></td>
                    <td class="border-r border-gray-200 px-4 py-2">
                            <span th:text="${product.stock}"
                                  th:class="${product.stock < 5} ? 'text-red-600 font-bold' : ''"></span>
                    </td>
                    <td class="border-r border-gray-200 px-4 py-2">
                        <span th:if="${product.active}" class="bg-green-500 text-white px-2 py-1 rounded text-sm whitespace-nowrap">Aktif</span>
                        <span th:unless="${product.active}" class="bg-gray-500 text-white px-2 py-1 rounded text-sm whitespace-nowrap">Nonaktif</span>
                    </td>
                    <td class="px-4 py-2 whitespace-nowrap">
                        <a th:href="@{/products/{id}/edit(id=${product.id})}"
                           class="text-blue-600 border border-blue-600 hover:bg-blue-600 hover:text-white px-2 py-1 rounded text-sm mr-1 inline-block transition-colors">Edit</a>
                        <form th:action="@{/products/{id}/delete(id=${product.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Hapus produk ini?')">
                            <button type="submit" class="text-red-600 border border-red-600 hover:bg-red-600 hover:text-white px-2 py-1 rounded text-sm inline-block transition-colors">Hapus</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${totalPages > 1}" aria-label="Navigasi halaman" class="mt-6">
            <ul class="flex justify-center -space-x-px">
                <li th:classappend="${currentPage == 0} ? 'opacity-50 pointer-events-none' : ''">
                    <a class="block px-3 py-2 border border-gray-300 rounded-l-md text-blue-600 hover:bg-gray-200 bg-white transition-colors" th:href="@{/products(page=${currentPage - 1})}">
                        &laquo; Sebelumnya
                    </a>
                </li>

                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:classappend="${i == currentPage} ? 'bg-blue-600 text-white border-blue-600' : 'text-blue-600 bg-white border-gray-300 hover:bg-gray-200 transition-colors'"
                       class="block px-3 py-2 border"
                       th:href="@{/products(page=${i})}"
                       th:text="${i + 1}">
                    </a>
                </li>

                <li th:classappend="${currentPage + 1 >= totalPages} ? 'opacity-50 pointer-events-none' : ''">
                    <a class="block px-3 py-2 border border-gray-300 rounded-r-md text-blue-600 hover:bg-gray-200 bg-white transition-colors" th:href="@{/products(page=${currentPage + 1})}">
                        Berikutnya &raquo;
                    </a>
                </li>
            </ul>
        </nav>

    </div>
</main>
</body>
</html>
