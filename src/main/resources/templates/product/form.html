<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk'"></title>
</head>
<body>
<main>
    <div class="container mt-4" style="max-width: 700px;">
        <h2 th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk'"></h2>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/products/save}" th:object="${product}" method="post" class="mt-3">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{createdAt}" />

            <div class="mb-3">
                <label class="form-label">Nama Produk <span class="text-danger">*</span></label>
                <input type="text" th:field="*{name}" class="form-control"
                       placeholder="Nama produk" required />
            </div>

            <!-- Dropdown category dari entity (bukan enum) -->
            <div class="mb-3">
                <label class="form-label">Kategori</label>
                <select name="categoryId" class="form-select">
                    <option value="">-- Pilih Kategori --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${product.category != null and product.category.id == cat.id}">
                    </option>
                </select>
                <div class="form-text">
                    Belum ada kategori?
                    <a href="/categories/new" target="_blank">Buat kategori baru</a>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Harga <span class="text-danger">*</span></label>
                <input type="number" th:field="*{price}" class="form-control"
                       min="0" placeholder="0" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Stok <span class="text-danger">*</span></label>
                <input type="number" th:field="*{stock}" class="form-control"
                       min="0" placeholder="0" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                <textarea th:field="*{description}" class="form-control" rows="4"
                          placeholder="Deskripsi produk (opsional)"></textarea>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" th:field="*{active}" class="form-check-input" />
                <label class="form-check-label">Produk Aktif</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"
                        th:text="${product.id != null} ? 'Simpan Perubahan' : 'Tambah Produk'"></button>
                <a href="/products" class="btn btn-outline-secondary">Batal</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
