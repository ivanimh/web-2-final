<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Beranda - ProductCRUD</title>
</head>
<body>
<main th:fragment="main">
    <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
        <div class="max-w-3xl">
            <h1 class="text-4xl sm:text-5xl font-bold text-gray-900 leading-tight mb-4 tracking-tight">
                Kelola Inventori <span class="text-blue-600">Lebih Efisien</span>
            </h1>
            <p class="text-lg text-gray-500 mb-8 max-w-xl mx-auto leading-relaxed">
                Aplikasi manajemen produk sederhana dan bersih untuk kebutuhan pencatatan inventori barang Anda.
            </p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a th:href="@{/dashboard}" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-md text-sm font-medium transition-colors">
                    Buka Dashboard
                </a>
                <a th:href="@{/products}" class="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-8 py-3 rounded-md text-sm font-medium transition-colors">
                    Lihat Produk
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
