<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori'"></title>
</head>
<body>
<main th:fragment="main">
    <div class="max-w-2xl mx-auto">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900" th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori'">Tambah Kategori</h1>
        </div>

        <div th:if="${errorMessage}" class="mb-5 p-3 bg-red-50 text-red-600 text-sm rounded-md border border-red-100" th:text="${errorMessage}"></div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6 sm:p-8">
            <form th:action="@{/categories/save}" th:object="${category}" method="post" class="space-y-5">
                <input type="hidden" th:field="*{id}" />

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">
                        Nama Kategori <span class="text-red-500">*</span>
                    </label>
                    <input type="text" th:field="*{name}"
                           class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                           placeholder="Contoh: Elektronik" required />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Deskripsi</label>
                    <textarea th:field="*{description}" rows="3"
                              class="w-full bg-white border border-gray-300 text-gray-900 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-none"
                              placeholder="Deskripsi kategori (opsional)"></textarea>
                </div>

                <div class="flex gap-3 pt-4 border-t border-gray-100 mt-6">
                    <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium transition-colors"
                            th:text="${isEdit} ? 'Simpan Perubahan' : 'Tambah Kategori'"></button>
                    <a href="/categories"
                       class="border border-gray-300 text-gray-700 hover:bg-gray-50 px-5 py-2 rounded-md text-sm font-medium transition-colors">
                        Batal
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
