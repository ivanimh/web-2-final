<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori'"></title>
</head>
<body>
<main>
    <div class="container mx-auto px-4 mt-8" style="max-width: 600px;">
        <h2 class="text-3xl font-medium mb-6"
            th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori'"></h2>

        <div th:if="${errorMessage}"
             class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"
             th:text="${errorMessage}"></div>

        <form th:action="@{/categories/save}" th:object="${category}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">
                    Nama Kategori <span class="text-red-500">*</span>
                </label>
                <input type="text" th:field="*{name}"
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"
                       placeholder="Contoh: Elektronik" required />
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Deskripsi</label>
                <textarea th:field="*{description}" rows="3"
                          class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"
                          placeholder="Deskripsi kategori (opsional)"></textarea>
            </div>

            <div class="flex gap-2 mt-6">
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors"
                        th:text="${isEdit} ? 'Simpan Perubahan' : 'Tambah Kategori'"></button>
                <a href="/categories"
                   class="border border-gray-500 text-gray-600 hover:bg-gray-500 hover:text-white px-4 py-2 rounded transition-colors">
                    Batal
                </a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
