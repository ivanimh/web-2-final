<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori'"></title>
</head>
<body>
<main>
    <div class="container mt-4" style="max-width: 600px;">
        <h2 th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori'"></h2>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/categories/save}" th:object="${category}" method="post" class="mt-3">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label">Nama Kategori <span class="text-danger">*</span></label>
                <input type="text" th:field="*{name}" class="form-control"
                       placeholder="Contoh: Elektronik" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                <textarea th:field="*{description}" class="form-control" rows="3"
                          placeholder="Deskripsi kategori (opsional)"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"
                        th:text="${isEdit} ? 'Simpan Perubahan' : 'Tambah Kategori'"></button>
                <a href="/categories" class="btn btn-outline-secondary">Batal</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
