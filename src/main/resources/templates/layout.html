<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, main)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<!-- Navbar Bersih & Minimalis -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center gap-8">
                <a href="/products" class="font-bold text-xl tracking-tight text-gray-900">
                    Product<span class="text-blue-600">CRUD</span>
                </a>
                <ul class="hidden md:flex items-center space-x-6">
                    <li><a href="/dashboard" class="text-gray-500 hover:text-blue-600 text-sm font-medium transition-colors">Dashboard</a></li>
                    <li><a href="/products" class="text-gray-500 hover:text-blue-600 text-sm font-medium transition-colors">Produk</a></li>
                    <li><a href="/categories" class="text-gray-500 hover:text-blue-600 text-sm font-medium transition-colors">Kategori</a></li>
                </ul>
            </div>
            <div class="hidden md:flex items-center gap-4">
                <a href="/profile" class="text-gray-500 hover:text-blue-600 text-sm font-medium transition-colors">Profil</a>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="text-red-500 hover:text-red-700 text-sm font-medium transition-colors">Logout</button>
                </form>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="md:hidden text-gray-500 hover:text-gray-800" onclick="document.getElementById('mob-nav').classList.toggle('hidden')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div id="mob-nav" class="hidden md:hidden border-t border-gray-100 py-3 space-y-1">
            <a href="/dashboard" class="block text-gray-600 hover:text-blue-600 hover:bg-gray-50 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
            <a href="/products" class="block text-gray-600 hover:text-blue-600 hover:bg-gray-50 px-3 py-2 rounded-md text-sm font-medium">Produk</a>
            <a href="/categories" class="block text-gray-600 hover:text-blue-600 hover:bg-gray-50 px-3 py-2 rounded-md text-sm font-medium">Kategori</a>
            <a href="/profile" class="block text-gray-600 hover:text-blue-600 hover:bg-gray-50 px-3 py-2 rounded-md text-sm font-medium">Profil</a>
            <form th:action="@{/logout}" method="post" class="pt-2">
                <button type="submit" class="w-full text-left text-red-500 hover:bg-red-50 px-3 py-2 rounded-md text-sm font-medium">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <div th:replace="${main}"></div>
</main>

<!-- Footer -->
<footer class="bg-white border-t border-gray-200 py-6">
    <div class="max-w-7xl mx-auto px-4 text-center">
        <p class="text-sm text-gray-400">ProductCRUD &copy; 2026.</p>
    </div>
</footer>
</body>
</html>
