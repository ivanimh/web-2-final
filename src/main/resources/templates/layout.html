<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, main)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

<nav class="bg-gray-900 text-white shadow-md mb-6">
    <div class="container mx-auto px-4 flex items-center justify-between py-3">
        <div class="flex items-center gap-6">
            <a class="text-xl font-medium text-white hover:text-gray-300 transition-colors" href="/products">Product CRUD</a>
            <ul class="flex gap-4">
                <li>
                    <a class="text-gray-400 hover:text-white transition-colors" href="/products">Produk</a>
                </li>
                <li>
                    <a class="text-gray-400 hover:text-white transition-colors" href="/categories">Kategori</a>
                </li>
            </ul>
        </div>
        <div>
            <ul class="flex">
                <li>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="border border-gray-400 text-gray-300 hover:bg-gray-100 hover:text-gray-900 px-3 py-1 rounded text-sm transition-colors">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:replace="${main}"></div>

</body>
</html>
