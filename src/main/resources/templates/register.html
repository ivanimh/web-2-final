<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-gray-100">
<div class="container mx-auto px-4">
    <div class="flex justify-center mt-20">
        <div class="w-full md:w-5/12">
            <div class="bg-white rounded-lg shadow-md border border-gray-200">
                <div class="p-8">
                    <h3 class="text-2xl font-medium text-center mb-6">Register</h3>

                    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" th:text="${error}"></div>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                        <div class="mb-4">
                            <label for="username" class="block text-gray-700 mb-2">Username</label>
                            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow" id="username"
                                   th:field="*{username}" placeholder="Masukkan username" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="block text-gray-700 mb-2">Password</label>
                            <input type="password" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow" id="password"
                                   th:field="*{password}" placeholder="Masukkan password" required>
                        </div>
                        <div class="mb-6">
                            <label for="confirmPassword" class="block text-gray-700 mb-2">Konfirmasi Password</label>
                            <input type="password" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow" id="confirmPassword"
                                   th:field="*{confirmPassword}" placeholder="Ulangi password" required>
                        </div>
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 w-full rounded transition-colors">Daftar</button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-gray-600">Sudah punya akun? </span>
                        <a th:href="@{/login}" class="text-blue-600 hover:underline">Login di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
